<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540" style="background:#fafaf9;font-family:system-ui,sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- ── VPS Container ── -->
<rect x="90" y="115" width="460" height="272" rx="14" stroke-width="1.2" fill="#f4f3ef" stroke="#b4b2a9" stroke-dasharray="7 3"/>
<text x="114" y="136" font-size="11" fill="#888780" font-weight="500">Hostinger VPS  ·  Docker  ·  UFW Firewall</text>

<!-- ── Soul Template ── -->
<rect x="108" y="178" width="148" height="46" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.8"/>
<text x="182" y="197" font-size="13" font-weight="600" fill="#0c447c" text-anchor="middle">Soul template</text>
<text x="182" y="212" font-size="11" fill="#185fa5" text-anchor="middle">5 .md profile files</text>

<!-- ── Memory ── -->
<rect x="108" y="238" width="148" height="46" rx="8" fill="#eaf3de" stroke="#3b6d11" stroke-width="0.8"/>
<text x="182" y="257" font-size="13" font-weight="600" fill="#27500a" text-anchor="middle">Memory</text>
<text x="182" y="272" font-size="11" fill="#3b6d11" text-anchor="middle">memory.json</text>

<!-- Arrows: soul→1ain, memory→1ain -->
<line x1="256" y1="200" x2="284" y2="238" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="256" y1="260" x2="284" y2="254" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- ── 1ain Core ── -->
<rect x="284" y="214" width="140" height="66" rx="10" fill="#faeeda" stroke="#ba7517" stroke-width="1.8"/>
<text x="354" y="237" font-size="16" font-weight="700" fill="#633806" text-anchor="middle">1ain</text>
<text x="354" y="256" font-size="11" fill="#854f0b" text-anchor="middle">personal master agent</text>
<text x="354" y="272" font-size="10" fill="#ba7517" text-anchor="middle">gatekeeper · orchestrator</text>

<!-- ── Subject (above VPS) ── -->
<rect x="274" y="22" width="160" height="46" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
<text x="354" y="41" font-size="13" font-weight="600" fill="#3c3489" text-anchor="middle">Subject</text>
<text x="354" y="57" font-size="11" fill="#534ab7" text-anchor="middle">single user  ·  you</text>

<!-- Subject → 1ain arrow -->
<line x1="354" y1="68" x2="354" y2="214" stroke="#534ab7" stroke-width="1.8" marker-end="url(#arrow)"/>

<!-- Telegram badge -->
<rect x="312" y="83" width="84" height="22" rx="11" fill="white" stroke="#b4b2a9" stroke-width="0.8"/>
<text x="354" y="98" font-size="11" font-weight="500" fill="#444441" text-anchor="middle">Telegram</text>

<!-- 1ain → Git arrow + label -->
<line x1="424" y1="247" x2="548" y2="247" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="486" y="239" font-size="10" fill="#888780" text-anchor="middle">git sync</text>

<!-- ── Git Repo (right of VPS) ── -->
<rect x="548" y="224" width="120" height="46" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.8"/>
<text x="608" y="243" font-size="13" font-weight="600" fill="#712b13" text-anchor="middle">Git repo</text>
<text x="608" y="258" font-size="11" fill="#993c1d" text-anchor="middle">private · encrypted</text>

<!-- Claude API indicator (small, top right) -->
<rect x="548" y="140" width="120" height="40" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="608" y="156" font-size="11" font-weight="500" fill="#5f5e5a" text-anchor="middle">Claude API</text>
<text x="608" y="170" font-size="10" fill="#888780" text-anchor="middle">reasoning engine</text>
<line x1="424" y1="230" x2="548" y2="165" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<!-- Dashed paths → future agents -->
<path d="M 320 280 L 320 400 L 180 400 L 180 434" fill="none" stroke="#b4b2a9" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<path d="M 388 280 L 388 400 L 520 400 L 520 434" fill="none" stroke="#b4b2a9" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- ── Hermes (Phase 2, grayed) ── -->
<rect x="106" y="434" width="148" height="46" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.8" stroke-dasharray="4 2" opacity="0.85"/>
<text x="180" y="453" font-size="13" font-weight="600" fill="#5f5e5a" text-anchor="middle">Hermes</text>
<text x="180" y="469" font-size="11" fill="#888780" text-anchor="middle">Phase 2  ·  work ops agent</text>

<!-- ── Future Agents (Phase 3+) ── -->
<rect x="446" y="434" width="148" height="46" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.8" stroke-dasharray="4 2" opacity="0.5"/>
<text x="520" y="453" font-size="13" font-weight="600" fill="#888780" text-anchor="middle">Future agents</text>
<text x="520" y="469" font-size="11" fill="#b4b2a9" text-anchor="middle">Phase 3+</text>

<!-- Legend -->
<text x="90" y="522" font-size="10" fill="#b4b2a9">Solid = Phase 1 live  ·  Dashed = future phases  ·  All sub-agents route through 1ain — never direct to subject</text>
</svg>
